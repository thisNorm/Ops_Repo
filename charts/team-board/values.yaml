nameOverride: payment-service
fullnameOverride: payment-service

image:
  repository: my-registry.io/payment-service
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 80

ingress:
  enabled: true
  host: payment.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60

env:
  - name: APP_ENV
    value: "development"
  - name: LOG_LEVEL
    value: "debug"
