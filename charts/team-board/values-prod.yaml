image:
  tag: "v2.1.3"

replicaCount: 3

ingress:
  host: payment.example.com

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 15
  targetCPUUtilizationPercentage: 70

env:
  - name: APP_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "warn"
